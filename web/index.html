<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>「待敌」市场分析系统</title>
<style>
:root{
  --bg:#f7f6f2;--sf:#fff;--sf2:#f1efe8;--sf3:#e8e6e0;
  --bd:rgba(0,0,0,0.09);--bd2:rgba(0,0,0,0.18);
  --tx:#1a1a18;--tx2:#5f5e5a;--tx3:#999;
  --G:#1d9e75;--Gbg:#eaf3de;--Gtx:#3b6d11;--Gdk:#085041;
  --R:#e24b4a;--Rbg:#fcebeb;--Rtx:#a32d2d;--Rdk:#791f1f;
  --A:#ba7517;--Abg:#faeeda;--Atx:#854f0b;--Adk:#633806;
  --B:#378add;--Bbg:#e6f1fb;--Btx:#0c447c;
  --P:#7f77dd;--Pbg:#eeedfe;--Ptx:#3c3489;
  --T:#1d9e75;--Tbg:#e1f5ee;--Ttx:#085041;
  --C:#d85a30;--Cbg:#faece7;--Ctx:#712b13;
  --r:8px;--r2:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#181816;--sf:#222220;--sf2:#2a2a28;--sf3:#333330;
    --bd:rgba(255,255,255,0.09);--bd2:rgba(255,255,255,0.2);
    --tx:#e6e4de;--tx2:#888;--tx3:#555;
    --Gbg:#0a2418;--Gtx:#5dcaa5;--Gdk:#9fe1cb;
    --Rbg:#2a0f0f;--Rtx:#f09595;--Rdk:#f7c1c1;
    --Abg:#261a06;--Atx:#ef9f27;--Adk:#fac775;
    --Bbg:#081828;--Btx:#85b7eb;
    --Pbg:#120f2e;--Ptx:#afa9ec;
    --Tbg:#041810;--Ttx:#9fe1cb;
    --Cbg:#2a1208;--Ctx:#f0997b;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;
     background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;}

/* topbar */
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:10px 20px;
        display:flex;align-items:center;justify-content:space-between;
        position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px;}
.app-title{font-size:15px;font-weight:700;letter-spacing:-.01em;}
.app-sub{font-size:11px;color:var(--tx2);}
.btn{font-size:12px;padding:5px 12px;border:1px solid var(--bd2);border-radius:var(--r);
     background:transparent;color:var(--tx);cursor:pointer;}
.btn:hover{background:var(--sf2);}
.ts{font-size:11px;color:var(--tx3);}

/* nav */
.nav{display:flex;gap:1px;padding:0 20px;background:var(--sf);
     border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nt{font-size:13px;padding:10px 14px;cursor:pointer;color:var(--tx2);
    border-bottom:2px solid transparent;white-space:nowrap;transition:.12s;}
.nt:hover{color:var(--tx);}
.nt.on{color:var(--tx);font-weight:600;border-bottom-color:var(--tx);}

/* sub-nav */
.snav{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;}
.snt{font-size:12px;padding:4px 11px;border-radius:20px;cursor:pointer;
     border:1px solid var(--bd);color:var(--tx2);background:var(--sf2);}
.snt:hover{color:var(--tx);}
.snt.on{background:var(--Tbg);color:var(--Ttx);border-color:var(--T);font-weight:600;}

/* main */
.main{max-width:1300px;margin:0 auto;padding:20px;}
.page{display:none;} .page.on{display:block;}
.subpage{display:none;} .subpage.on{display:block;}

/* card */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r2);
      padding:16px 20px;margin-bottom:12px;}
.ct{font-size:14px;font-weight:600;margin-bottom:12px;}

/* grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}

/* metric */
.mc{background:var(--sf2);border-radius:var(--r);padding:12px 14px;}
.ml{font-size:11px;color:var(--tx2);margin-bottom:4px;}
.mv{font-size:20px;font-weight:700;color:var(--tx);line-height:1.2;}
.ms{font-size:11px;margin-top:3px;color:var(--tx2);}

/* table */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{font-size:11px;font-weight:600;color:var(--tx2);text-align:left;
   padding:0 8px 8px 0;border-bottom:1px solid var(--bd);letter-spacing:.04em;}
td{padding:8px 8px 8px 0;border-bottom:1px solid var(--bd);vertical-align:top;}
tr:last-child td{border-bottom:none;}

/* tags */
.tag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600;white-space:nowrap;}
.tG{background:var(--Gbg);color:var(--Gtx);}
.tR{background:var(--Rbg);color:var(--Rtx);}
.tA{background:var(--Abg);color:var(--Atx);}
.tN{background:var(--sf2);color:var(--tx2);}
.tB{background:var(--Bbg);color:var(--Btx);}
.tP{background:var(--Pbg);color:var(--Ptx);}
.tT{background:var(--Tbg);color:var(--Ttx);}
.tC{background:var(--Cbg);color:var(--Ctx);}

/* bars */
.brow{display:flex;align-items:center;gap:8px;}
.bbg{flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden;}
.bfill{height:100%;border-radius:3px;}
.fG{background:var(--G);}.fR{background:var(--R);}.fA{background:var(--A);}
.fB{background:var(--B);}.fN{background:#888;}

/* dot */
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dG{background:var(--G);}.dR{background:var(--R);}
.dA{background:var(--A);}.dN{background:#888;}.dB{background:var(--B);}
.dP{background:var(--P);}

/* alert box */
.abox{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border-radius:var(--r);margin-bottom:8px;}
.aG{background:var(--Gbg);} .aR{background:var(--Rbg);} .aA{background:var(--Abg);}
.aB{background:var(--Bbg);} .aP{background:var(--Pbg);} .aC{background:var(--Cbg);}
.atG{color:var(--Gtx);} .atR{color:var(--Rtx);} .atA{color:var(--Atx);}
.atB{color:var(--Btx);} .atP{color:var(--Ptx);} .atC{color:var(--Ctx);}
.abG{color:var(--Gdk);} .abR{color:var(--Rdk);} .abA{color:var(--Adk);}

/* chain flow */
.cflow{display:flex;gap:0;border-radius:var(--r);overflow:hidden;border:1px solid var(--bd);margin-bottom:10px;}
.cfn{flex:1;padding:10px 8px;border-right:1px solid var(--bd);min-width:0;}
.cfn:last-child{border-right:none;}
.cfn.active{outline:2px solid var(--G);outline-offset:-2px;}
.cfs{font-size:9px;font-weight:600;letter-spacing:.06em;margin-bottom:3px;opacity:.7;}
.cfname{font-size:12px;font-weight:600;margin-bottom:2px;}
.cfd{font-size:10px;line-height:1.4;opacity:.7;}
.cft{font-size:9px;font-weight:600;margin-top:4px;padding:1px 5px;border-radius:3px;display:inline-block;}
.cfI{background:#eeedfe;} .cfI .cfs{color:#534ab7;} .cfI .cfname{color:#3c3489;} .cfI .cft{background:#afa9ec;color:#26215c;}
.cfU{background:#e1f5ee;} .cfU .cfs{color:#0f6e56;} .cfU .cfname{color:#085041;} .cfU .cft{background:#9fe1cb;color:#04342c;}
.cfM{background:#faeeda;} .cfM .cfs{color:#854f0b;} .cfM .cfname{color:#633806;} .cfM .cft{background:#fac775;color:#412402;}
.cfD{background:#e6f1fb;} .cfD .cfs{color:#185fa5;} .cfD .cfname{color:#0c447c;} .cfD .cft{background:#b5d4f4;color:#042c53;}
.cfW{background:#fcebeb;} .cfW .cfs{color:#a32d2d;} .cfW .cfname{color:#791f1f;} .cfW .cft{background:#f7c1c1;color:#501313;}

/* decision card */
.dc{border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px;margin-bottom:10px;}
.dcGO{border-left:4px solid var(--G);}
.dcWAIT{border-left:4px solid var(--A);}
.dcNO{border-left:4px solid var(--R);}
.dch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px;}
.dcname{font-size:15px;font-weight:700;}
.dcsub{font-size:11px;color:var(--tx2);margin-top:2px;}
.dcmet{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;}
.dcm{background:var(--sf2);border-radius:var(--r);padding:7px 10px;}
.dcml{font-size:10px;color:var(--tx3);margin-bottom:2px;}
.dcmv{font-size:13px;font-weight:700;}
.lcs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.lc{font-size:11px;padding:2px 6px;border-radius:3px;font-weight:500;}
.lcP{background:var(--Gbg);color:var(--Gtx);}
.lcF{background:var(--sf2);color:var(--tx2);}
.dca{font-size:12px;padding:8px 12px;border-radius:var(--r);margin-top:8px;}
.daG{background:var(--Gbg);color:var(--Gtx);}
.daA{background:var(--Abg);color:var(--Atx);}
.daR{background:var(--Rbg);color:var(--Rtx);}

/* logic chain blocks */
.lblock{padding:11px 14px;border-radius:var(--r);border-left:3px solid;margin-bottom:6px;}
.lbG{background:var(--Gbg);border-left-color:var(--G);}
.lbR{background:var(--Rbg);border-left-color:var(--R);}
.lbA{background:var(--Abg);border-left-color:var(--A);}
.lbB{background:var(--Bbg);border-left-color:var(--B);}
.lbP{background:var(--Pbg);border-left-color:var(--P);}
.lblbl{font-size:10px;font-weight:700;letter-spacing:.06em;margin-bottom:3px;}
.lbG .lblbl{color:var(--Gtx);} .lbR .lblbl{color:var(--Rtx);} .lbA .lblbl{color:var(--Atx);}
.lbB .lblbl{color:var(--Btx);} .lbP .lblbl{color:var(--Ptx);}
.lbtx{font-size:12px;line-height:1.65;}
.lbG .lbtx{color:var(--Gdk);} .lbR .lbtx{color:var(--Rdk);} .lbA .lbtx{color:var(--Adk);}
.lbB .lbtx{color:var(--Btx);} .lbP .lbtx{color:var(--Ptx);}

/* trap card */
.trapcard{border-radius:var(--r);padding:12px 14px;background:var(--sf2);margin-bottom:8px;}
.trapn{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:5px;display:flex;align-items:center;gap:7px;}
.trapb{font-size:12px;color:var(--tx2);line-height:1.6;}

/* step */
.step{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--bd);}
.step:last-child{border-bottom:none;}
.stepnum{width:26px;height:26px;border-radius:50%;background:var(--sf2);border:1px solid var(--bd);
         display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
         color:var(--tx2);flex-shrink:0;}
.steptx .st{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:3px;}
.steptx .ss{font-size:12px;color:var(--tx2);line-height:1.55;}

/* cross-check */
.crow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);}
.crow:last-child{border-bottom:none;}
.clabels{display:flex;gap:5px;flex-wrap:wrap;min-width:170px;}
.carrow{font-size:18px;color:var(--tx3);}
.ctxt{font-size:12px;color:var(--tx2);flex:1;line-height:1.5;}
.csig{font-size:11px;font-weight:700;min-width:64px;text-align:right;}
.csigS{color:var(--R);} .csigW{color:var(--A);} .csigN{color:var(--tx2);}

/* loading */
#loading{position:fixed;inset:0;background:var(--bg);
         display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;}
.spin{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--B);
      border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

/* responsive */
@media(max-width:680px){
  .g4{grid-template-columns:1fr 1fr;}
  .g3{grid-template-columns:1fr 1fr;}
  .g2{grid-template-columns:1fr;}
  .dcmet{grid-template-columns:1fr 1fr;}
  .cflow{flex-direction:column;}
  .cfn{border-right:none;border-bottom:1px solid var(--bd);}
  .cfn:last-child{border-bottom:none;}
}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><div style="font-size:13px;color:var(--tx2);">载入数据中…</div></div>

<div class="topbar">
  <div>
    <div class="app-title">「待敌」市场分析系统</div>
    <div class="app-sub">昔之善战者，先为不可胜，以待敌之可胜。 ——《孙子兵法·形篇》</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="ts" id="tsb">—</span>
    <button class="btn" onclick="loadData()">刷新</button>
  </div>
</div>

  <div class="nav">
  <div class="nt on" onclick="showPage('ov',this)">总览</div>
  <div class="nt" onclick="showPage('trend',this)">趋势判定</div>
  <div class="nt" onclick="showPage('l0',this)">L0 风险</div>
  <div class="nt" onclick="showPage('l1',this)">L1 实业数据</div>
  <div class="nt" onclick="showPage('l2',this)">L2 金融期货</div>
  <div class="nt" onclick="showPage('l3',this)">L3 产业链</div>
  <div class="nt" onclick="showPage('l4',this)">L4 头部企业</div>
  <div class="nt" onclick="showPage('l5',this)">L5 个股决策</div>
  <div class="nt" onclick="showPage('logic',this)">逻辑链图谱</div>
</div>

<div class="main">
  <div id="pg-ov"    class="page on"></div>
  <div id="pg-trend" class="page"></div>
  <div id="pg-l0"   class="page"></div>
  <div id="pg-l1"   class="page"></div>
  <div id="pg-l2"   class="page"></div>
  <div id="pg-l3"   class="page"></div>
  <div id="pg-l4"   class="page"></div>
  <div id="pg-l5"   class="page"></div>
  <div id="pg-logic" class="page"></div>
  <div id="pg-cross" class="page"></div>
  <div id="pg-trap"  class="page"></div>
</div>

<script>
let D=null;

// ── helpers ──────────────────────────────────────────────────────────────────
const h=s=>s||'';
const fmtN=v=>v!=null?v.toLocaleString():'—';
const fmtYoy=v=>v!=null?`<span style="color:${v>0?'var(--R)':'var(--G)'};">${v>0?'+':''}${v.toFixed(1)}%</span>`:'—';
const fmtZ=v=>v!=null?`<span style="color:${Math.abs(v)>1.5?(v>0?'var(--R)':'var(--G)'):'var(--tx2)'};">${v>0?'+':''}${v.toFixed(2)}σ</span>`:'—';
const sc=s=>s>=65?'var(--G)':s>=45?'var(--A)':'var(--R)';
const l0c=l=>({GREEN:'var(--G)',YELLOW:'var(--A)',RED:'var(--R)'}[l]||'var(--tx2)');
const sigTag=s=>{const m={UP:'tG',DOWN:'tR',NEUTRAL:'tN',ALERT_UP:'tG',ALERT_DOWN:'tR'};return`<span class="tag ${m[s]||'tN'}">${s}</span>`;};
const dirTag=d=>{const m={BULLISH:'tG',BEARISH:'tR',NEUTRAL:'tN'};return`<span class="tag ${m[d]||'tN'}">${d}</span>`;};
const vtag=v=>{const m={GO:'tG',WAIT:'tA',NO:'tR'};return`<span class="tag ${m[v]||'tN'}">${v}</span>`;};
const ttag=t=>{const m={BREAKOUT:'tG',PULLBACK:'tB',ACCUMULATION:'tA',NONE:'tN'};return`<span class="tag ${m[t]||'tN'}">${t||'—'}</span>`;};
const cfcls=s=>{if(s.includes('国际'))return'cfI';if(s.includes('上游'))return'cfU';if(s.includes('中游'))return'cfM';if(s.includes('下游'))return'cfD';if(s.includes('风险'))return'cfW';return'cfU';};

// ── 总览 ─────────────────────────────────────────────────────────────────────
function pgOv(){
  const s=D.summary,l0=D.layer0,l1=D.layer1,l3=D.layer3,l5=D.layer5,t=D.trend;
  const go=l5.filter(d=>d.verdict==='GO');
  const totalAmt=go.reduce((a,d)=>a+d.first_batch_amt,0);
  const tcolor={GO:'var(--G)',WAIT:'var(--A)',NO:'var(--R)'}[t.verdict]||'var(--tx2)';
  return`
  <div class="g4" style="margin-bottom:14px;">
    <div class="mc"><div class="ml">趋势判定</div>
      <div class="mv" style="color:${tcolor};font-size:17px;">${t.verdict}</div>
      <div class="ms">${t.trend} · 置信度${t.confidence}% · ${t.source}</div></div>
    <div class="mc"><div class="ml">实业·期货信号</div>
      <div class="mv">${s.l1_score}<span style="font-size:13px;font-weight:400;color:var(--tx2);"> / ${s.l2_score}</span></div>
      <div class="ms" style="color:${Math.abs(s.l1_score-s.l2_score)>25?'var(--A)':'var(--G)'};">${Math.abs(s.l1_score-s.l2_score)>25?'⚠ 两层背离':'✓ 方向一致'}</div></div>
    <div class="mc"><div class="ml">激活产业链</div>
      <div class="mv" style="color:var(--G);">${s.active_chains}</div>
      <div class="ms">${l3.top_nodes[0]?.chain||'—'} 信号最强</div></div>
    <div class="mc"><div class="ml">可入场标的</div>
      <div class="mv" style="color:${go.length?'var(--G)':'var(--tx2)'};">${go.length}</div>
      <div class="ms">首批合计 ¥${totalAmt.toLocaleString()}</div></div>
  </div>

  ${t.reasoning?`<div class="lblock lb${t.verdict==='GO'?'G':t.verdict==='WAIT'?'A':'R'}" style="margin-bottom:12px;">
    <div class="lblbl">AI 趋势分析 · ${t.trend} · 置信度${t.confidence}%</div>
    <div class="lbtx">${t.reasoning}</div>
  </div>`:''}

  ${l0.triggered.length?`<div class="abox aR" style="margin-bottom:12px;">
    <div class="dot dR" style="margin-top:5px;"></div>
    <div><div style="font-weight:700;color:var(--Rtx);margin-bottom:3px;">Layer 0 风险触发</div>
    ${l0.triggered.map(t=>`<div style="font-size:12px;color:var(--Rdk);">${t}</div>`).join('')}</div></div>`:''}

  ${l1.alerts.length?`<div class="card"><div class="ct">⚡ 实业数据异动（超出季节性均值±1.5σ）</div>
    ${l1.alerts.map(a=>`<div class="abox ${a.signal.includes('UP')?'aG':'aR'}" style="margin-bottom:6px;">
      <div class="dot ${a.signal.includes('UP')?'dG':'dR'}" style="margin-top:4px;"></div>
      <div><div style="font-weight:600;font-size:13px;color:${a.signal.includes('UP')?'var(--Gtx)':'var(--Rtx)'};">${a.name}：${a.value} ${a.unit} （偏离 ${a.zscore!=null?(a.zscore>0?'+':'')+a.zscore.toFixed(2):'?'}σ）</div>
      <div style="font-size:12px;color:${a.signal.includes('UP')?'var(--Gdk)':'var(--Rdk)'};">${a.note}</div></div></div>`).join('')}
  </div>`:''}

  <div class="card"><div class="ct">当前最佳布局节点</div>
    ${l3.top_nodes.map(n=>`
    <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd);">
      <div style="width:38px;height:38px;border-radius:50%;background:var(--Bbg);color:var(--Btx);
           display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">${n.strength}</div>
      <div style="flex:1;">
        <div style="font-weight:700;">${n.chain} <span style="font-size:12px;font-weight:400;color:var(--tx2);">· ${n.node}</span></div>
        <div style="font-size:12px;color:var(--tx2);margin-top:2px;">${n.window}</div>
        ${n.reasoning?`<div style="font-size:11px;color:var(--tx3);margin-top:4px;line-height:1.5;">${n.reasoning}</div>`:''}
      </div>
      ${n.l2_aligned?'<span class="tag tG">L2确认</span>':'<span class="tag tN">L2待确认</span>'}
    </div>`).join('')}
  </div>

  ${go.length?`<div class="card"><div class="ct">✅ GO 标的速览</div>
    ${go.map(d=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);">
      <div><span style="font-weight:700;">${d.name}</span>
        <span style="font-size:11px;color:var(--tx2);margin-left:6px;">${d.code} · ${d.chain}</span>
        <div style="font-size:12px;color:var(--tx2);margin-top:2px;">${d.reason}</div></div>
      <div style="text-align:right;flex-shrink:0;margin-left:12px;">

// ── L5 ───────────────────────────────────────────────────────────────────────
function pgL5(){
  const ds=D.layer5;const cap=D.meta.capital;
  const go=ds.filter(d=>d.verdict==='GO');
  const wait=ds.filter(d=>d.verdict==='WAIT');
  const no=ds.filter(d=>d.verdict==='NO');
  const totalAmt=go.reduce((a,d)=>a+d.first_batch_amt,0);
  const dcCard=d=>`
  <div class="dc dc${d.verdict}">
    <div class="dch">
      <div>
        <div class="dcname">${d.name} <span style="font-size:12px;font-weight:400;color:var(--tx2);">${d.code}</span></div>
        <div class="dcsub">${d.chain}</div>
      </div>
      ${vtag(d.verdict)}
    </div>
    <div class="lcs">
      <span class="lc ${d.layers.l0?'lcP':'lcF'}">${d.layers.l0?'✓':'✗'} L0</span>
      <span class="lc ${d.layers.l1?'lcP':'lcF'}">${d.layers.l1?'✓':'✗'} L1</span>
      <span class="lc ${d.layers.l2?'lcP':'lcF'}">${d.layers.l2?'✓':'✗'} L2</span>
      <span class="lc ${d.layers.l3?'lcP':'lcF'}">${d.layers.l3?'✓':'✗'} L3</span>
      <span class="lc ${d.layers.l4>=75?'lcP':'lcF'}">L4·${d.layers.l4}分</span>
      ${ttag(d.timing)}
    </div>
    <div class="dcmet">
      <div class="dcm"><div class="dcml">建议仓位</div><div class="dcmv" style="color:${d.verdict==='GO'?'var(--G)':'var(--tx2)'};">${d.position_pct.toFixed(1)}%</div></div>
      <div class="dcm"><div class="dcml">首批金额</div><div class="dcmv">¥${d.first_batch_amt.toLocaleString()}</div></div>
      <div class="dcm"><div class="dcml">止损距离</div><div class="dcmv">-${d.stop_loss_pct}%</div></div>
      <div class="dcm"><div class="dcml">最大亏损</div><div class="dcmv" style="color:var(--R);">¥${Math.round(d.first_batch_amt*d.stop_loss_pct/100).toLocaleString()}</div></div>
    </div>
    <div class="dca ${d.verdict==='GO'?'daG':d.verdict==='WAIT'?'daA':'daR'}">
      <strong>${d.verdict==='GO'?'执行：':d.verdict==='WAIT'?'等待：':'拒绝：'}</strong>${d.action}
      <div style="font-size:11px;margin-top:3px;opacity:.8;">${d.reason}</div>
    </div>
  </div>`;
  return`
  <div class="g4" style="margin-bottom:12px;">
    <div class="mc"><div class="ml">可入场</div><div class="mv" style="color:${go.length?'var(--G)':'var(--tx2)'};">${go.length}</div></div>
    <div class="mc"><div class="ml">观察中</div><div class="mv" style="color:var(--A);">${wait.length}</div></div>
    <div class="mc"><div class="ml">已拒绝</div><div class="mv" style="color:var(--tx2);">${no.length}</div></div>
    <div class="mc"><div class="ml">首批总金额</div><div class="mv" style="color:${go.length?'var(--G)':'var(--tx2)'};">¥${totalAmt.toLocaleString()}</div>
      <div class="ms">占总资金 ${(totalAmt/cap*100).toFixed(1)}%</div></div>
  </div>
  <div class="lblock lbG" style="margin-bottom:12px;"><div class="lblbl">仓位计算三步法</div>
    <div class="lbtx">①大盘环境上限（牛市单只10%，震荡6%，熊市2%）→ ②层数比例（通过5层×100%，4层×85%，3层×60%，2层×30%）→ ③止损修正（实际仓位 = 基础仓位 × 5% ÷ 止损距离%）。每笔最大亏损金额基本相同，确保风险均等。</div></div>
  ${go.length?`<div style="font-size:13px;font-weight:700;color:var(--Gtx);margin-bottom:8px;">✅ 可入场</div>${go.map(dcCard).join('')}`:''}
  ${wait.length?`<div style="font-size:13px;font-weight:700;color:var(--Atx);margin:12px 0 8px;">⏳ 观察中</div>${wait.map(dcCard).join('')}`:''}

}

// ── 跨层信号验证 ──────────────────────────────────────────────────────────────
function pgCross(){
  const l1=D.layer1,l2=D.layer2;
  const STRONG=[
    {l1:'L1：铜库存低位',l2:'L2：LME升水（Backwardation）',sig:'强做多',cls:'csigS',desc:'实业需求旺盛（L1）+ 市场定价确认（L2），铜相关标的可提高仓位。'},
    {l1:'L1：社融回升',l2:'L2：国债期货上涨',sig:'全市场做多',cls:'csigS',desc:'信用扩张（L1）+ 流动性宽松预期（L2），历史上这个组合后6个月上涨概率超70%。'},
    {l1:'L1：海鲜出口↑',l2:'L2：美元走弱',sig:'细分做多',cls:'csigS',desc:'出口景气（L1）+ 汇率顺风（L2），水产出口企业双重利好，可精确到细分标的。'},
    {l1:'L1：电子用电ALERT↑',l2:'L2：美债下行 + 美元弱',sig:'AI链做多',cls:'csigS',desc:'三层同时共振，当前框架内最强信号，AI算力链可提仓。'},
    {l1:'L1：工业用电↓',l2:'L2：铜期货Contango（远月升水）',sig:'制造业清仓',cls:'csigS',desc:'制造业开工下降（L1）+ 市场判断供给宽松（L2），制造业相关标的清仓信号。'},
  ];
  const WARN=[
    {l1:'L1：PMI新订单↑',l2:'L2：股指期货贴水扩大',sig:'减仓等待',cls:'csigW',desc:'实业数据好转但机构在加码对冲，可能机构掌握更多信息，降仓50%等待收敛。'},
    {l1:'L1：螺纹钢库存↑',l2:'L2：铁矿石期货大涨',sig:'不追高',cls:'csigW',desc:'实业端供给过剩，但期货端有大资金拉抬。期货行情短期，实业数据会纠正，不追。'},
    {l1:'L1：电子用电↑',l2:'L2：美债收益率↑',sig:'延迟入场',cls:'csigW',desc:'国内AI/电子景气，但美债上行压制全球科技估值，A股科技股上有压力，等美债企稳。'},
    {l1:'L1：社零消费↑',l2:'L2：VIX突破20',sig:'Layer 0介入',cls:'csigS',desc:'国内消费复苏，但全球风险偏好骤降，外资会先撤出不管基本面，Layer 0暂停新仓。'},

  return`

    <div class="crow">
      <div class="clabels"><span class="tag tG">${r.l1}</span><span class="tag tR">${r.l2}</span></div>

      <div class="ctxt">${r.desc}</div>
      <div class="csig ${r.cls}">${r.sig}</div>

        <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd);">
          <div class="dot ${i.signal.includes('UP')?'dG':'dR'}"></div>
          <div style="flex:1;font-size:12px;">${i.name}</div>
          ${sigTag(i.signal)}

      </div>
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:8px;">Layer 2 期货</div>
        ${[...D.layer2.intl,...D.layer2.futures].filter(s=>s.direction!=='NEUTRAL').map(s=>`
        <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bd);">

    </div>
  </div>`;
}

// ── 陷阱识别 ──────────────────────────────────────────────────────────────────
function pgTrap(){
  const TRAPS=[
    {n:'名字改了赛道没变',b:'公司名称加入"数字""智能""新能源"等关键词，主营业务丝毫未变。验证方法：看收入结构3年变化，名字改了但分部收入结构一样=纯炒概念。'},
    {n:'战略合作公告满天飞',b:'与知名企业签署"战略合作协议"，但协议无金额、无排他、无约束力。真正的合作是采购订单，有金额有交期。"战略合作"四个字本身不值钱。'},
    {n:'供应链关联无限延伸',b:'声称是某热门产业链"供应商"，但供货金额极小或只有一次性采购。比如"向某AI大厂供货"——金额可能只有几十万，占收入不到0.1%。'},
    {n:'补贴撑起的利润',b:'扣非净利润（扣除政府补贴后）长期为负，靠补贴维持账面盈利。真头部利润来自市场竞争。看利润表：政府补贴/净利润比值超过50%就要警惕。'},
    {n:'大股东高位减持',b:'公司对外大力宣传产业链机会，同时大股东悄悄提交减持计划。两者同时出现几乎是确定性的信号——内部人比你更清楚公司实际情况。减持公告比任何分析都可靠。'},
    {n:'研报密集覆盖',b:'突然被十几家券商同时给出"买入"评级，目标价大幅上调。券商研报是利益相关的，IPO承销、定增配合、机构抱团都会影响评级。研报密集出现往往是机构出货的配合动作。'},
  ];
  const STEPS=[
    {t:'第一步：看扣非净利润（10秒过滤60%概念股）',d:'打开利润表，找"扣除非经常性损益后的净利润"。连续3年为正且增长=基本面真实。扣非为负但净利润为正=靠补贴或资产出售撑着，不是真盈利。'},
    {t:'第二步：查前五大客户',d:'年报必须披露前五大客户名称和销售金额。核心问题：客户是不是行业龙头？占比是否合理（单客户超40%集中度风险，低于5%说明是边缘供应商）？客户是不是关联方？'},
    {t:'第三步：看经营现金流与利润比值',d:'经营活动现金流/净利润，正常范围0.8-1.5。长期低于0.5说明利润收不回来（应收账款高企或虚增收入）。长期高于2说明业务现金创造能力极强，是优质标的特征。'},
    {t:'第四步：查大股东持股变动',d:'证监会要求大股东减持前3天预披露。在公司大力宣传好故事的同时，去交易所官网查"大股东减持计划"。两者同时出现=最强的卖出信号，超过任何基本面分析。'},
    {t:'第五步：验证研发投入真实性',d:'研发费用率稳定在8-20%且研发人员数量连续增长=真正在投入。研发费用突然暴增（配合融资/股价）但人员未增=财务操纵迹象。看研发人员绝对数量，不只看金额。'},
  ];
  return`
  <div class="lblock lbR" style="margin-bottom:14px;"><div class="lblbl">A股特殊性警告</div>
    <div class="lbtx">A股市场游资和概念炒作极其活跃。真趋势+假标的是最常见的亏损来源——趋势判断对了，买到的是蹭概念的垃圾公司，钱照样亏。Layer 4 的作用就是在六层框架的最后关口过滤掉这类陷阱，确保进入 Layer 5 的标的都是真实的产业链参与者。</div></div>

  <div class="card"><div class="ct">六种最常见概念陷阱</div>
    <div class="g2">
      ${TRAPS.map((t,i)=>`
      <div class="trapcard">
        <div class="trapn">
          <div style="width:20px;height:20px;border-radius:50%;background:var(--Rbg);color:var(--Rtx);
               font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${i+1}</div>
          ${t.n}
        </div>
        <div class="trapb">${t.b}</div>
      </div>`).join('')}
    </div>
  </div>

  <div class="card"><div class="ct">识别真假头部：五步快速验证法</div>
    ${STEPS.map((s,i)=>`
    <div class="step">
      <div class="stepnum" style="background:var(--Gbg);border-color:var(--G);color:var(--Gtx);">${i+1}</div>
      <div class="steptx">
        <div class="st">${s.t}</div>
        <div class="ss">${s.d}</div>
      </div>
    </div>`).join('')}
  </div>

  <div class="card"><div class="ct">真头部 vs 概念股：财务特征对比</div>
    <table>
      <tr><th>检验项</th><th>真头部特征</th><th>概念股特征</th><th>查验方式</th></tr>
      ${[
        ['研发投入','研发费用率稳定8-20%，研发人员连续增长','研发费用突然暴增（配合融资），或长期接近零','年报研发明细·人员数量变化'],
        ['关联交易','关联交易占收入比例低，有合理商业逻辑','大量关联交易、大客户是关联方、应收账款高企','年报关联交易披露·前五大客户'],
        ['现金流','经营现金流与净利润方向一致，比例0.8-1.5','利润高但经营现金流为负，靠融资维持运营','现金流量表：经营活动/净利润'],
        ['股东行为','大股东持股稳定，高管增持，有回购记录','高位减持、质押比例高、频繁更换高管','股权质押公告·高管持股变动'],
        ['跨界公告','新业务与主业有明确协同，分步骤推进','突然宣布进入热门赛道，无技术积累无客户','公告历史：跨界宣布时间是否在股价低点'],
      ].map(([k,g,r,v])=>`<tr>
        <td style="font-weight:600;">${k}</td>
        <td style="color:var(--Gtx);font-size:12px;">${g}</td>
        <td style="color:var(--Rtx);font-size:12px;">${r}</td>
        <td style="color:var(--tx2);font-size:11px;">${v}</td>
      </tr>`).join('')}
    </table>
  </div>`;
}

// ── 路由 ─────────────────────────────────────────────────────────────────────
const PAGES={ov:pgOv,trend:pgTrend,l0:pgL0,l1:pgL1,l2:pgL2,l3:pgL3,l4:pgL4,l5:pgL5,logic:pgLogic};
let curPage='ov';

function showPage(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('on'));
  document.getElementById('pg-'+name).classList.add('on');
  el.classList.add('on');
  curPage=name;
  if(D) renderPage(name);
}
function renderPage(name){
  const el=document.getElementById('pg-'+name);
  if(el&&D&&PAGES[name]) el.innerHTML=PAGES[name]();
}
function renderAll(){Object.keys(PAGES).forEach(renderPage);}

// sub-nav
function swLogic(name,el){
  document.querySelectorAll('[id^="lsub-"]').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('#logicsnav .snt').forEach(t=>t.classList.remove('on'));
  const el2=document.getElementById('lsub-'+name);
  if(el2) el2.classList.add('on');
  el.classList.add('on');
}

// ── 数据加载（三级回退：HTTP fetch → 内嵌数据 → 手动选择文件） ─────────────
async function loadData(){
  // 优先级1：HTTP fetch（http.server 模式）
  try{
    const r=await fetch('dashboard.json?t='+Date.now());
    if(r.ok){ D=await r.json(); applyData(); return; }
  }catch(e){}

  // 优先级2：读取内嵌数据（dashboard_standalone.html 模式）
  try{
    const emb=document.getElementById('embedded-data');
    if(emb){ D=JSON.parse(emb.textContent); applyData(); return; }
  }catch(e){}

  // 优先级3：显示提示 + 手动选择文件
  document.getElementById('loading').innerHTML=`
  <div style="text-align:center;padding:40px;max-width:420px;">
    <div style="font-size:15px;color:var(--Rtx);margin-bottom:8px;">⚠ 无法加载 dashboard.json</div>
    <div style="font-size:13px;color:var(--tx2);margin-bottom:16px;line-height:1.7;">
      请先运行 Python 后端生成数据：<br>
      <code style="background:var(--sf2);padding:4px 10px;border-radius:var(--r);font-size:12px;display:inline-block;margin-top:6px;">python export_json.py</code><br>
      <span style="font-size:12px;margin-top:6px;display:block;">或在 web/ 目录运行：</span>
      <code style="background:var(--sf2);padding:4px 10px;border-radius:var(--r);font-size:12px;display:inline-block;margin-top:4px;">python -m http.server 8080</code><br>
      <span style="font-size:12px;margin-top:8px;display:block;">也可以手动选择 dashboard.json 文件：</span>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;">
      <button onclick="loadData()" class="btn">重试</button>
      <button onclick="document.getElementById('filepick').click()" class="btn">选择文件</button>
      <input type="file" id="filepick" accept=".json" style="display:none;" onchange="loadFromFile(this)">
    </div>
  </div>`;
}
function loadFromFile(input){
  const f=input.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=e=>{try{D=JSON.parse(e.target.result);applyData();}catch(err){alert('JSON 解析失败：'+err.message);}};
  reader.readAsText(f);
}
function applyData(){
  document.getElementById('tsb').textContent='更新：'+D.meta.generated_at;
  renderAll();
  document.getElementById('loading').style.display='none';
}
loadData();
</script>
